{% extends "base.html" %}

{% block title %}User Registration{% endblock %}

{% block content %}
<section class="hero-card">
    <div>
        <div class="eyebrow">User Portal</div>
        <h2>User Registration</h2>
        <p class="helper-text">Register your details first. After registration, the webcam opens so you can save face samples for admin lookup.</p>
    </div>
</section>

<section class="auth-wrap compact-auth-wrap">
    <article class="auth-card login-card">
        <form method="post" class="form-stack">
            <label>
                Full Name
                <input type="text" name="name" value="{{ form_data.name or '' }}" placeholder="Enter full name" required>
            </label>

            <label>
                User ID
                <input type="text" name="person_identifier" value="{{ form_data.person_identifier or '' }}" placeholder="Enter unique user ID">
            </label>

            <label>
                Email
                <input type="email" name="email" value="{{ form_data.email or '' }}" placeholder="Enter email address">
            </label>

            <button type="submit" class="secondary">Register Details</button>
        </form>
    </article>
</section>
{% endblock %}
